name: Create GitHub Release

on:
  push:
    tags:
      - 'jellyfin-*'
      - 'emby-*'
      - 'plex-*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'The git tag to create a release for (e.g., jellyfin-10.11.6.0)'
        required: true

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
    - name: Get tag name
      id: get_tag
      run: |
        if [[ "${{ github.event_name }}" == "push" ]]; then
          TAG=${GITHUB_REF#refs/tags/}
        else
          TAG=${{ github.event.inputs.tag }}
        fi
        echo "tag=$TAG" >> $GITHUB_OUTPUT

    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        ref: ${{ steps.get_tag.outputs.tag }}

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore Jellyfin.Plugin.Lastfm.sln

    - name: Build solution
      run: dotnet build Jellyfin.Plugin.Lastfm.sln -c Release --no-restore

    - name: Create plugin zip
      run: |
        cd Jellyfin.Plugin.Lastfm/bin/Release/net9.0
        zip -r ../../../../plugin.zip .
        cd -

    - name: Create GitHub Release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ steps.get_tag.outputs.tag }}
        release_name: "Release ${{ steps.get_tag.outputs.tag }}"
        file: plugin.zip
        overwrite: true
        body: "Automated release for ${{ steps.get_tag.outputs.tag }}"

        file: "lastfm_${{ steps.get_tag.outputs.tag }}.zip"
        asset_name: "lastfm_${{ steps.get_tag.outputs.tag }}.zip"
        tag: ${{ steps.get_tag.outputs.tag }}
        overwrite: true
        body: |
          ## Jellyfin Last.fm Plugin v${{ steps.get_tag.outputs.tag }}

          ### Installation
          Download the ZIP file and extract to your Jellyfin plugins directory.

          **Target ABI:** ${{ steps.build_config.outputs.target_abi }}

    - name: Upload updated manifest as artifact
      uses: actions/upload-artifact@v4
      with:
        name: manifest
        path: manifest.json

    - name: Commit and push updated manifest
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git checkout main
        cp manifest.json manifest.json.new
        git stash
        mv manifest.json.new manifest.json
        git add manifest.json
        git diff --cached --quiet || git commit -m "chore: Update manifest for v${GIT_TAG_NAME}"
        git push origin main
