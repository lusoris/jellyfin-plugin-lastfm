<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Last.fm Configuration</title>
</head>
<body>
    <div id="LastfmConfigPage" data-role="page" class="page type-interior pluginConfigurationPage"
         data-require="emby-input,emby-button,emby-select,emby-checkbox">

        <div data-role="content">
            <div class="content-primary">
                <form id="lastfmConfigForm">
                    <div class="verticalSection">
                        <h2 class="sectionTitle">Last.fm Account</h2>

                        <div class="selectContainer">
                            <select is="emby-select" id="selectUser" name="selectUser" label="Jellyfin User:"></select>
                        </div>

                        <div class="inputContainer">
                            <input is="emby-input" type="text" id="txtUsername" name="txtUsername" label="Last.fm Username:" />
                        </div>

                        <div class="inputContainer">
                            <input is="emby-input" type="password" id="txtPassword" name="txtPassword" label="Last.fm Password:" />
                            <div class="fieldDescription">Your password is only used once to obtain a session key and is never stored.</div>
                        </div>
                    </div>

                    <div class="verticalSection">
                        <h2 class="sectionTitle">Options</h2>

                        <div class="checkboxContainer">
                            <label>
                                <input is="emby-checkbox" type="checkbox" id="chkScrobble" name="chkScrobble" />
                                <span>Enable scrobbling</span>
                            </label>
                        </div>

                        <div class="checkboxContainer">
                            <label>
                                <input is="emby-checkbox" type="checkbox" id="chkSyncFavorites" name="chkSyncFavorites" />
                                <span>Sync favorites to loved tracks</span>
                            </label>
                        </div>

                        <div class="checkboxContainer">
                            <label>
                                <input is="emby-checkbox" type="checkbox" id="chkImportLoved" name="chkImportLoved" />
                                <span>Import loved tracks as favorites</span>
                            </label>
                        </div>
                    </div>

                    <div>
                        <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                            <span>Save</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <script type="text/javascript">
            // Plugin configuration script
            const PLUGIN_ID = '5e7fe7f0-b048-429e-a431-b1a7e69c930d';

            document.addEventListener('viewshow', function() {
                const page = this;
                loadConfiguration(page);
            });

            async function loadConfiguration(page) {
                // TODO: Implement configuration loading
                Dashboard.showLoadingMsg();

                try {
                    const [config, users] = await Promise.all([
                        ApiClient.getPluginConfiguration(PLUGIN_ID),
                        ApiClient.getUsers()
                    ]);

                    populateUserSelect(page, users);
                    // TODO: Populate form with user config

                } catch (error) {
                    console.error('Failed to load configuration:', error);
                    Dashboard.alert('Failed to load configuration');
                } finally {
                    Dashboard.hideLoadingMsg();
                }
            }

            function populateUserSelect(page, users) {
                const select = page.querySelector('#selectUser');
                select.innerHTML = users.map(u =>
                    `<option value="${u.Id}">${u.Name}</option>`
                ).join('');
            }

            // Form submit handler
            document.querySelector('#lastfmConfigForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                // TODO: Implement save
                Dashboard.alert('Configuration saved!');
            });
        </script>
    </div>
</body>
</html>
