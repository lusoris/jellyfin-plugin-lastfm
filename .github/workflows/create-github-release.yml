name: Publish

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'The git tag to create a release for'
        required: true

jobs:
  build:
    name: Publish binaries
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Get tag name
      id: get_tag
      run: |
        if [[ "${{ github.event_name }}" == "push" ]]; then
          TAG=${GITHUB_REF#refs/tags/}
        else
          TAG=${{ github.event.inputs.tag }}
        fi
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "GIT_TAG_NAME=$TAG" >> $GITHUB_ENV

    - uses: actions/checkout@v4
      with:
        ref: ${{ steps.get_tag.outputs.tag }}

    - name: Checkout manifest build scripts repo
      uses: actions/checkout@v4
      with:
        repository: lusoris/jellyfin-utilities
        path: manifest-tools

    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install yq for YAML parsing
      run: |
        sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        sudo chmod +x /usr/local/bin/yq

    - name: Read build configuration
      id: build_config
      run: |
        TARGET_ABI=$(yq '.targetAbi' build.yaml)
        PLUGIN_NAME=$(yq '.name' build.yaml)
        PLUGIN_GUID=$(yq '.guid' build.yaml)
        echo "target_abi=$TARGET_ABI" >> $GITHUB_OUTPUT
        echo "plugin_name=$PLUGIN_NAME" >> $GITHUB_OUTPUT
        echo "plugin_guid=$PLUGIN_GUID" >> $GITHUB_OUTPUT
        echo "Using targetAbi: $TARGET_ABI"

    - name: Build release via dotnet build
      run: dotnet build Jellyfin.Plugin.Lastfm/Jellyfin.Plugin.Lastfm.csproj -c Release

    - name: Create ZIP archive of plugin release
      run: |
        cd Jellyfin.Plugin.Lastfm/bin/Release/net9.0
        zip -j "$GITHUB_WORKSPACE/lastfm_${GIT_TAG_NAME}.zip" Jellyfin.Plugin.Lastfm.dll

    - name: Fetch existing manifest from repo
      run: curl -o manifest.json "https://raw.githubusercontent.com/lusoris/jellyfin-plugin-lastfm/main/manifest.json"

    - name: Update manifest with new version
      run: |
        CK=$(python manifest-tools/md5/md5.py -f "lastfm_${GIT_TAG_NAME}.zip")
        echo "Checksum: $CK"
        python manifest-tools/manifest-generator/manifest.py -app "Last.fm" -f manifest.json version \
          -ver "${GIT_TAG_NAME}" \
          -cl "Jellyfin LastFM build v${GIT_TAG_NAME}" \
          -abi "${{ steps.build_config.outputs.target_abi }}" \
          -url "https://github.com/lusoris/jellyfin-plugin-lastfm/releases/download/${GIT_TAG_NAME}/lastfm_${GIT_TAG_NAME}.zip" \
          -ck "${CK}"

    - name: Validate manifest JSON
      run: |
        python -c "import json; m = json.load(open('manifest.json')); print('Manifest is valid JSON')"
        # Fix broken timestamp format: +00:00Z -> Z
        python -c "
import json
with open('manifest.json') as f:
    d = json.load(f)
for v in d[0].get('versions', []):
    ts = v.get('timestamp', '')
    if ts.endswith('+00:00Z'):
        v['timestamp'] = ts.replace('+00:00Z', 'Z')
with open('manifest.json', 'w') as f:
    json.dump(d, f, indent=2)
"
        echo "=== Updated Manifest ==="
        cat manifest.json | python -m json.tool

    - name: Create GitHub release and upload binaries
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: "lastfm_${{ steps.get_tag.outputs.tag }}.zip"
        asset_name: "lastfm_${{ steps.get_tag.outputs.tag }}.zip"
        tag: ${{ steps.get_tag.outputs.tag }}
        overwrite: true
        body: |
          ## Jellyfin Last.fm Plugin v${{ steps.get_tag.outputs.tag }}

          ### Installation
          Download the ZIP file and extract to your Jellyfin plugins directory.

          **Target ABI:** ${{ steps.build_config.outputs.target_abi }}

    - name: Upload updated manifest as artifact
      uses: actions/upload-artifact@v4
      with:
        name: manifest
        path: manifest.json

    - name: Commit and push updated manifest
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git fetch origin main
        git checkout main
        cp manifest.json manifest.json.new
        git stash
        mv manifest.json.new manifest.json
        git add manifest.json
        git diff --cached --quiet || git commit -m "chore: Update manifest for v${GIT_TAG_NAME}"
        git push origin main
