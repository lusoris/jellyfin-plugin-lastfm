guid: 5e7fe7f0-b048-429e-a431-b1a7e69c931d
name: Last.fm Scrobbler
description: Scrobble music to Last.fm, sync loved tracks, and generate smart playlists
overview: >
  Automatically scrobble your music listening activity to Last.fm.

  Features:
  - Automatic scrobbling (30s minimum, 50% or 4min played)
  - Now Playing updates
  - Loved tracks synchronization (bidirectional)
  - Play count import with multiple strategies
  - Smart playlist generation (Similar Artists, Similar Tracks, Rediscover Favorites, Weekly Mixtape, Tag Discovery)
  - Offline queue with JSON persistence

  Requirements:
  - Last.fm account
  - Emby Server 4.8+
  - .NET Framework 4.8

category: Music
owner: jesseward
sourceUrl: https://github.com/jesseward/jellyfin-plugin-lastfm
imageUrl: https://raw.githubusercontent.com/jesseward/jellyfin-plugin-lastfm/master/logo.png

