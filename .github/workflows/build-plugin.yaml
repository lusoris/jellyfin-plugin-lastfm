name: 'Build Plugin'

on:
  push:
    branches:
      - develop
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Check formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic

  lint-ai-slop:
    name: Check for AI Slop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run AI Slop Detector
        run: bash .github/scripts/lint-ai-slop.sh

  build:
    name: Build Plugin
    needs: [lint]
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/build.yaml@master

  test-manifest:
    name: Test Manifest Generation
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install yq for YAML parsing
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Read build configuration
        id: build_config
        run: |
          TARGET_ABI=$(yq '.targetAbi' build.yaml)
          PLUGIN_VERSION=$(yq '.version' build.yaml)
          echo "target_abi=$TARGET_ABI" >> $GITHUB_OUTPUT
          echo "plugin_version=$PLUGIN_VERSION" >> $GITHUB_OUTPUT
          echo "Using targetAbi: $TARGET_ABI, version: $PLUGIN_VERSION"

      - name: Build release
        run: dotnet build Jellyfin.Plugin.Lastfm/Jellyfin.Plugin.Lastfm.csproj -c Release

      - name: Create test ZIP archive
        run: |
          cd Jellyfin.Plugin.Lastfm/bin/Release/net9.0
          zip -j "$GITHUB_WORKSPACE/lastfm_dev-build.zip" Jellyfin.Plugin.Lastfm.dll

      - name: Generate test manifest
        run: |
          # Calculate checksum of dev build
          CK=$(python .github/tools/md5.py -f "lastfm_dev-build.zip")
          echo "Checksum: $CK"

          # Create a fresh test manifest
          python .github/tools/manifest.py \
            -f test-manifest.json \
            -app "Last.fm" \
            -create \
            application \
            -guid "5e7fe7f0-b048-429e-a431-b1a7e69c930d" \
            -desc "Scrobble your music to Last.fm" \
            -ov "A plugin that scrobbles played music to Last.fm and optionally imports loved tracks" \
            -owner "lusoris" \
            -cat "General"

          # Add a test version entry
          python .github/tools/manifest.py \
            -f test-manifest.json \
            -app "Last.fm" \
            version \
            -ver "dev-${{ github.sha }}" \
            -cl "Development build from commit ${{ github.sha }}" \
            -abi "${{ steps.build_config.outputs.target_abi }}" \
            -url "https://github.com/lusoris/jellyfin-plugin-lastfm/actions/runs/${{ github.run_id }}" \
            -ck "${CK}"

          echo "=== Generated Test Manifest ==="
          cat test-manifest.json | python -m json.tool

      - name: Validate manifest JSON
        run: python -c "import json; json.load(open('test-manifest.json'))" && echo "✓ Manifest JSON is valid"

      - name: Upload test manifest
        uses: actions/upload-artifact@v4
        with:
          name: test-manifest
          path: test-manifest.json

      - name: Upload dev build
        uses: actions/upload-artifact@v4
        with:
          name: dev-build
          path: lastfm_dev-build.zip
